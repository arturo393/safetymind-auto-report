server {
    listen 443 ssl;
    server_name safetymind-report.local;

    ssl_certificate /etc/ssl/certs/safetymind.crt;
    ssl_certificate_key /etc/ssl/private/safetymind.key;

    # Industrial Portal (Next.js) - RESTORED PORT 8501
    location / {
        proxy_pass http://localhost:8501;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # SecOps Backend Gateway (FastAPI)
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
