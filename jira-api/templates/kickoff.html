<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kickoff Report - \VAR{project_key}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #000000; }
        .header { background: #ffed01; padding: 20px; }
        .metric { margin: 20px 0; padding: 10px; background: #f5f5f5; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SafetyMind Kickoff Report</h1>
        <p><strong>Project:</strong> \VAR{project_key}</p>
        <p><strong>Date:</strong> \VAR{report_date}</p>
    </div>
    
    <div class="metric">
        <h2>Project Overview</h2>
        <p><strong>Client:</strong> \VAR{client}</p>
        <p><strong>Project Manager:</strong> \VAR{project_manager}</p>
    </div>
    
    <div class="metric">
        <h2>Executive Summary</h2>
        <p>\VAR{description}</p>
    </div>
</body>
</html>
