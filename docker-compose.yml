services:
  jira-api:
    build:
      context: .
      dockerfile: jira-api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JIRA_URL=${JIRA_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
      - OLLAMA_URL=${OLLAMA_URL:-http://172.19.0.1:11434}
    volumes:
      - ./reports:/app/reports
      - ./jira-api/templates:/app/templates:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jira-portal:
    build:
      context: .
      dockerfile: jira-portal/Dockerfile
    ports:
      - "8501:8501"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - jira-api
    restart: unless-stopped

volumes:
  reports-data:
