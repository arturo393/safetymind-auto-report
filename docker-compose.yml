services:
  jira-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JIRA_URL=${JIRA_URL}
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN}
    volumes:
      - ./reports:/app/reports
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  jira-portal:
    image: safetymind-jira-portal
    ports:
      - "8501:8501"
    environment:
      - NEXT_PUBLIC_API_URL=http://172.18.0.2:8080
    depends_on:
      - jira-api
    restart: unless-stopped
